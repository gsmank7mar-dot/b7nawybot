<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <title>SEVENAWY</title>
</head>
<body>
    <div id="particles-js"></div>
    <h1>SEVENAWY</h1>
    
    <div class="card">
        <button onclick="show('calc')">Calculator</button>
        <button onclick="show('pass')">Password Gen</button>
    </div>

    <div id="calc" class="card hidden">
        <h3>Calculator</h3>
        <input type="number" id="n1"> <input type="number" id="n2">
        <button onclick="calc()">Calculate</button>
        <p id="res"></p>
    </div>

    <div id="pass" class="card hidden">
        <h3>Password Generator</h3>
        <button onclick="genPass()">Generate</button>
        <p id="p-res"></p>
    </div>

    <footer style="position:fixed; bottom:10px; right:10px;">B7</footer>

    <script src="https://cdn.jsdelivr.net/particles.js/2.0.0/particles.min.js"></script>
    <script>
        particlesJS.load('particles-js', 'https://particles.js.org/assets/particles.json');
        function show(id) { document.querySelectorAll('.card').forEach(c => c.classList.add('hidden')); document.getElementById(id).classList.remove('hidden'); }
        function calc() { let r = parseFloat(document.getElementById('n1').value) / parseFloat(document.getElementById('n2').value) * 100; document.getElementById('res').innerText = r.toFixed(2) + '%'; }
        function genPass() { document.getElementById('p-res').innerText = Math.random().toString(36).slice(-10); }
    </script>
</body>
</html>
